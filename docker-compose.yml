version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: university-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  students-api:
    build:
      context: ./students-api
      dockerfile: Dockerfile
    container_name: students-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  courses-api:
    build:
      context: ./courses-api
      dockerfile: Dockerfile
    container_name: courses-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      PORT: 3001
      STUDENTS_SERVICE_URL: http://students-api:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      students-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data: